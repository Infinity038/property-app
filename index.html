<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PropApp">
<title>Ducay Property Portfolio</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <span style="display:flex;align-items:center;gap:4px">
      <span id="sync-dot" class="sync-dot"></span>
      <span id="sync-label" style="font-size:10px;color:var(--muted)">Synced</span>
    </span>
    <span><i class="ti ti-wifi" style="font-size:13px"></i></span>
  </div>

  <div class="page active screen" id="page-dash"><div id="dash-content"></div></div>
  <div class="page screen" id="page-salary"><div id="salary-content"></div></div>
  <div class="page screen" id="page-exp"><div id="expenses-content"></div></div>
  <div class="page screen" id="page-goals"><div id="goals-content"></div></div>
  <div class="page screen" id="page-props"><div id="props-content"></div></div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-dash" onclick="App.switchPage('dash')"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></button>
    <button class="nav-btn" id="nav-salary" onclick="App.switchPage('salary')"><i class="ti ti-currency-dollar"></i><span>Income</span></button>
    <button class="nav-btn" id="nav-exp" onclick="App.switchPage('exp')"><i class="ti ti-receipt"></i><span>Expenses</span></button>
    <button class="nav-btn" id="nav-goals" onclick="App.switchPage('goals')"><i class="ti ti-target"></i><span>Goals</span></button>
    <button class="nav-btn" id="nav-props" onclick="App.switchPage('props')"><i class="ti ti-building"></i><span>Properties</span></button>
  </div>
</div>

<!-- ── EXPENSE SHEET ── -->
<div class="overlay" id="scanSheet">
  <div class="sheet">
    <div class="sheet-hd">
      <h4>Add expense</h4>
      <button class="sheet-close" onclick="App.closeSheet('scanSheet')"><i class="ti ti-x"></i></button>
    </div>
    <img id="scan-preview" style="display:none;width:100%;max-height:150px;object-fit:contain;border-radius:12px;margin-bottom:12px;border:1px solid var(--border)" alt="Receipt">
    <div class="field"><label>Expense name</label><input type="text" id="scan-name" placeholder="e.g. Netto groceries"></div>
    <div class="field"><label>Amount (kr.)</label><input type="number" id="scan-amount" placeholder="0"></div>
    <div class="field"><label>Date</label><input type="date" id="scan-date"></div>

    <!-- Recurring toggle -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:var(--faint);border-radius:10px">
      <input type="checkbox" id="exp-recurring-cb" style="width:18px;height:18px;accent-color:var(--accent)" onchange="document.getElementById('exp-recurrence-row').style.display=this.checked?'block':'none'">
      <label for="exp-recurring-cb" style="font-size:13px;font-weight:700;cursor:pointer"><i class="ti ti-refresh" style="font-size:14px;vertical-align:-2px;margin-right:4px;color:var(--accent)"></i> Recurring expense</label>
    </div>
    <div id="exp-recurrence-row" style="display:none" class="field">
      <label>Repeats</label>
      <select id="exp-recurrence">
        <option value="monthly">Monthly</option>
        <option value="bi-weekly">Bi-weekly</option>
        <option value="weekly">Weekly</option>
        <option value="yearly">Yearly</option>
      </select>
    </div>

    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Category</div>
    <div class="cat-grid">
      <button class="cat-btn" data-cat="Housing" onclick="App.selectCat('Housing')"><i class="ti ti-home-dollar" style="font-size:15px"></i> Housing</button>
      <button class="cat-btn" data-cat="Food" onclick="App.selectCat('Food')"><i class="ti ti-shopping-cart" style="font-size:15px"></i> Food</button>
      <button class="cat-btn" data-cat="Transport" onclick="App.selectCat('Transport')"><i class="ti ti-car" style="font-size:15px"></i> Transport</button>
      <button class="cat-btn" data-cat="Utilities" onclick="App.selectCat('Utilities')"><i class="ti ti-bolt" style="font-size:15px"></i> Utilities</button>
      <button class="cat-btn" data-cat="Maintenance" onclick="App.selectCat('Maintenance')"><i class="ti ti-tools" style="font-size:15px"></i> Maintenance</button>
      <button class="cat-btn" data-cat="Renovation" onclick="App.selectCat('Renovation')"><i class="ti ti-hammer" style="font-size:15px"></i> Renovation</button>
      <button class="cat-btn" data-cat="Healthcare" onclick="App.selectCat('Healthcare')"><i class="ti ti-heart-rate-monitor" style="font-size:15px"></i> Healthcare</button>
      <button class="cat-btn" data-cat="Entertainment" onclick="App.selectCat('Entertainment')"><i class="ti ti-device-tv" style="font-size:15px"></i> Entertainment</button>
      <button class="cat-btn" data-cat="Business" onclick="App.selectCat('Business')"><i class="ti ti-briefcase" style="font-size:15px"></i> Business</button>
      <button class="cat-btn" data-cat="Personal" onclick="App.selectCat('Personal')"><i class="ti ti-user" style="font-size:15px"></i> Personal</button>
      <button class="cat-btn" data-cat="Other" onclick="App.selectCat('Other')"><i class="ti ti-dots" style="font-size:15px"></i> Other</button>
    </div>
    <div class="sheet-actions">
      <button class="btn-outline" onclick="App.closeSheet('scanSheet')">Cancel</button>
      <button class="btn-primary" id="confirm-expense-btn" onclick="App.confirmExpense()" style="margin:0;flex:1"><i class="ti ti-check"></i> Save expense</button>
    </div>
  </div>
</div>

<!-- ── GOAL SHEET ── -->
<div class="overlay" id="goalSheet">
  <div class="sheet">
    <div class="sheet-hd">
      <h4 id="goal-sheet-title">New goal</h4>
      <button class="sheet-close" onclick="App.closeSheet('goalSheet')"><i class="ti ti-x"></i></button>
    </div>
    <div class="field"><label>Goal name</label><input type="text" id="goal-title-in" placeholder="e.g. Emergency fund"></div>
    <div class="field">
      <label>Goal type</label>
      <select id="goal-type-sel" onchange="App.toggleGoalType(this.value)">
        <option value="savings">Savings goal (fixed target)</option>
        <option value="lifestyle">Lifestyle fund (flexible spend)</option>
      </select>
    </div>

    <!-- Savings fields -->
    <div id="goal-savings-fields">
      <div class="field"><label>Target amount (kr.)</label><input type="number" id="goal-target-in" placeholder="0"></div>
      <div class="field"><label>Already saved (kr.)</label><input type="number" id="goal-saved-in" placeholder="0"></div>
      <div class="field"><label>Monthly allocation (kr.)</label><input type="number" id="goal-alloc-in" placeholder="0"></div>
    </div>

    <!-- Lifestyle fields -->
    <div id="goal-lifestyle-fields" style="display:none">
      <div style="background:#E6F1FB;border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#185FA5">
        <i class="ti ti-info-circle" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>
        A lifestyle fund has a maximum cap. You can freely top up and withdraw. Great for "fun money" or a shared spending budget.
      </div>
      <div class="field"><label>Monthly spending cap (kr.)</label><input type="number" id="goal-cap-in" placeholder="e.g. 5000"></div>
      <div class="field"><label>Current balance (kr.)</label><input type="number" id="goal-balance-in" placeholder="0"></div>
    </div>

    <div class="field">
      <label>Icon</label>
      <select id="goal-icon-sel">
        <option value="ti-shield-check">🛡 Emergency fund</option>
        <option value="ti-building-bank">🏦 Property deposit</option>
        <option value="ti-hammer">🔨 Renovation</option>
        <option value="ti-plane">✈️ Vacation</option>
        <option value="ti-car">🚗 Car</option>
        <option value="ti-heart">❤️ Family</option>
        <option value="ti-piggy-bank">🐷 Savings</option>
        <option value="ti-cash">💵 Cash reserve</option>
        <option value="ti-target">🎯 Goal</option>
        <option value="ti-star">⭐ Dream</option>
        <option value="ti-shopping-bag">🛍 Lifestyle fund</option>
        <option value="ti-mood-happy">😊 Fun money</option>
        <option value="ti-glass-full">🥂 Entertainment</option>
      </select>
    </div>
    <div class="sheet-actions">
      <button class="btn-outline" onclick="App.closeSheet('goalSheet')">Cancel</button>
      <button class="btn-primary" onclick="App.saveGoal()" style="margin:0;flex:1"><i class="ti ti-device-floppy"></i> Save goal</button>
    </div>
  </div>
</div>

<!-- ── SIDE HUSTLE / INCOME SHEET ── -->
<div class="overlay" id="incomeSheet">
  <div class="sheet">
    <div class="sheet-hd">
      <h4>Log income</h4>
      <button class="sheet-close" onclick="App.closeSheet('incomeSheet')"><i class="ti ti-x"></i></button>
    </div>
    <div class="field"><label>Description</label><input type="text" id="income-desc" placeholder="e.g. Freelance project, eBay sale..."></div>
    <div class="field"><label>Amount (kr.)</label><input type="number" id="income-amount" placeholder="0"></div>
    <div class="field"><label>Date received</label><input type="date" id="income-date"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:var(--faint);border-radius:10px">
      <input type="checkbox" id="income-recurring" style="width:18px;height:18px;accent-color:var(--accent)" onchange="document.getElementById('income-recurrence-row').style.display=this.checked?'block':'none'">
      <label for="income-recurring" style="font-size:13px;font-weight:700;cursor:pointer"><i class="ti ti-refresh" style="font-size:14px;vertical-align:-2px;margin-right:4px;color:var(--accent)"></i> Recurring income</label>
    </div>
    <div id="income-recurrence-row" style="display:none" class="field">
      <label>Frequency</label>
      <select id="income-recurrence">
        <option value="bi-weekly">Every 2 weeks</option>
        <option value="monthly">Monthly</option>
        <option value="weekly">Weekly</option>
      </select>
    </div>
    <div class="sheet-actions">
      <button class="btn-outline" onclick="App.closeSheet('incomeSheet')">Cancel</button>
      <button class="btn-primary" onclick="App.saveIncome()" style="margin:0;flex:1"><i class="ti ti-check"></i> Log income</button>
    </div>
  </div>
</div>

<!-- ── PROPERTY SHEET ── -->
<div class="overlay" id="propSheet">
  <div class="sheet">
    <div class="sheet-hd">
      <h4 id="prop-sheet-title">Add property</h4>
      <button class="sheet-close" onclick="App.closeSheet('propSheet')"><i class="ti ti-x"></i></button>
    </div>
    <div class="field"><label>Property name</label><input type="text" id="prop-name" placeholder="e.g. Maple Street Duplex"></div>
    <div class="field"><label>Address</label><input type="text" id="prop-addr" placeholder="Street, city"></div>
    <div class="field"><label>Status</label>
      <select id="prop-status"><option>Rented</option><option>Vacant</option><option>Under renovation</option><option>Primary residence</option></select>
    </div>
    <div class="divider"></div>
    <div class="field"><label>Monthly rent income (kr.)</label><input type="number" id="prop-rent" placeholder="0"></div>
    <div class="field"><label>Monthly mortgage (kr.)</label><input type="number" id="prop-mortgage" placeholder="0"></div>
    <div class="field"><label>Monthly insurance + tax (kr.)</label><input type="number" id="prop-ins" placeholder="0"></div>
    <div class="divider"></div>
    <div class="field"><label>Purchase price (kr.)</label><input type="number" id="prop-purchase" placeholder="0"></div>
    <div class="field"><label>Current market value (kr.)</label><input type="number" id="prop-value" placeholder="0"></div>
    <div class="field"><label>Outstanding loan balance (kr.)</label><input type="number" id="prop-loan" placeholder="0"></div>
    <div class="sheet-actions">
      <button class="btn-outline" onclick="App.closeSheet('propSheet')">Cancel</button>
      <button class="btn-primary" onclick="App.saveProp()" style="margin:0;flex:1"><i class="ti ti-device-floppy"></i> Save property</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/db.js"></script>
<script src="/app.js"></script>
</body>
</html>
